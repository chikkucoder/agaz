<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Partner Login - Aagaj Foundation</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ED1C24;
            --dark: #051630;
        }

        body { 
            background-color: #f4f6f9; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            font-family: sans-serif; padding: 15px;
            position: relative;
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            text-decoration: none; color: var(--dark); font-weight: bold;
            font-size: 13px; display: flex; align-items: center; gap: 6px;
            transition: 0.3s; padding: 6px 12px; background: white;
            border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .back-btn:hover { color: var(--primary); transform: translateY(-2px); }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 480px) {
            .back-btn { top: 10px; left: 10px; font-size: 12px; }
            .login-card { padding: 25px 20px; }
            .logo img { height: 60px; }
            h4 { font-size: 1.25rem; }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            height: 80px;
            padding: 5px;
            background: white;
            border-radius: 5px;
        }

        .btn-login {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
        }

        .btn-login:hover {
            background-color: #d11a21;
            color: white;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(237, 28, 36, 0.1);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <div class="login-card">
        <div class="logo">
            <img src="../public/logo.jpg" alt="Aagaj Logo">
            <h4 class="mt-3 fw-bold text-dark">Hospital Partner</h4>
            <p class="text-muted small">Login to manage your patients & bills</p>
        </div>

        <form id="hospitalLoginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Hospital Email / User ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control border-start-0 ps-0" placeholder="Enter email" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="Enter password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login" id="loginBtn">LOGIN NOW</button>
        </form>

        <div class="footer-text mt-3">
            For technical support, contact helpline:<br>
            <i class="fa-solid fa-phone me-1 text-danger"></i> 9431430464
        </div>
        
        <hr class="my-4">
        <div class="text-center d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-decoration-none small text-muted hover-red"><i class="fa-solid fa-house me-1"></i> Home</a>
            <span class="text-muted opacity-50">|</span>
            <a href="hospital-admin.html" class="text-decoration-none small text-danger fw-bold"><i class="fa-solid fa-user-shield me-1"></i> Master Admin</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('hospitalLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(CONFIG.API_URL + '/api/hospital-admin-system/hospital/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if(data.success) {
                    localStorage.setItem('hospitalToken', data.token);
                    localStorage.setItem('hospitalInfo', JSON.stringify(data.hospital));
                    window.location.href = 'hospital-dashboard.html';
                } else {
                    alert("❌ " + data.message);
                }
            } catch (error) {
                alert("⚠️ Server connection error!");
            } finally {
                btn.innerHTML = 'LOGIN NOW';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
