<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Failed - Aagaj Foundation</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-red: #ED1C24; --primary-yellow: #fdd831; --text-dark: #333333; --bg-light: #fffdf5; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .failed-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 5px solid var(--primary-red); text-align: center; max-width: 600px; width: 90%; }
        .failed-icon { font-size: 6rem; color: var(--primary-red); margin-bottom: 20px; }
        .btn-retry { background-color: var(--primary-yellow); color: var(--text-dark); font-weight: 700; padding: 12px 30px; border-radius: 50px; border: none; transition: all 0.3s; margin-top: 20px; display: inline-block; text-decoration: none; }
        .btn-retry:hover { background-color: #e5c32c; color: var(--text-dark); transform: translateY(-2px); }
        .btn-outline { border: 2px solid #ccc; color: #555; background: transparent; font-weight: 600; padding: 10px 25px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 15px; transition: all 0.3s;}
        .btn-outline:hover { background: #eee; color: #333; }
    </style>
</head>
<body>

    <div class="failed-card">
        <i class="fa-solid fa-circle-xmark failed-icon"></i>
        <h1 class="fw-bold mb-3">Payment Failed</h1>
        <p class="text-muted fs-5 mb-4">Unfortunately, your transaction could not be completed. This might be due to a network issue, insufficient funds, or the payment was cancelled.</p>
        
        <div class="d-flex flex-column align-items-center">
            <a href="donate.html" class="btn-retry w-100">
                <i class="fa-solid fa-rotate-right me-2"></i> Try Again
            </a>
            <a href="index.html" class="btn-outline w-100 mt-3">
                Cancel & Return Home
            </a>
        </div>
    </div>

</body>
</html>
