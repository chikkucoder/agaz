<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Aagaj Foundation</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-red: #ED1C24;   
            --text-dark: #333333;
            --bg-light: #fffdf5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-red), #b0151b);
            color: white;
            padding: 20px;
            border-bottom: none;
        }

        .form-control:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 0 0.25rem rgba(237, 28, 36, 0.1);
        }

        .input-group-text {
            border-color: #ced4da;
            background-color: #f8f9fa;
        }

        .btn-custom {
            background-color: var(--primary-red);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #b0151b;
            color: white;
        }

        /* Hide the OTP section initially */
        #otpSection {
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold">
                <i class="fa-solid fa-key me-2"></i> Reset Password
            </h5>
            <a href="admin_login_employe.html" class="text-white text-decoration-none" title="Back to Login">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>

        <div class="p-4">
            <form id="emailForm">
                <div class="text-center mb-4">
                    <p class="text-muted small">Enter your email address below to receive an OTP.</p>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Registered Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" class="form-control" id="resetEmail" placeholder="admin@example.com" required>
                    </div>
                </div>
                <button type="submit" id="sendOtpBtn" class="btn btn-custom w-100 py-2 mb-3">SEND OTP</button>
            </form>

            <form id="otpSection">
                <div class="text-center mb-4">
                    <p class="text-success small fw-bold">✅ OTP sent to your email!</p>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Enter 6-digit OTP</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-message"></i></span>
                        <input type="text" class="form-control" id="otpCode" placeholder="123456" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
                    </div>
                </div>
                <button type="submit" id="resetBtn" class="btn btn-custom w-100 py-2 mb-3">RESET PASSWORD</button>
            </form>

            <div class="text-center">
                <a href="admin_login_employe.html" class="text-decoration-none small fw-bold text-muted">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const emailForm = document.getElementById("emailForm");
        const otpSection = document.getElementById("otpSection");
        let savedEmail = "";

        // STEP 1: Send Email API Call
        emailForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = document.getElementById("resetEmail").value;
            const btn = document.getElementById("sendOtpBtn");
            
            btn.innerHTML = "Sending...";
            btn.disabled = true;

            try {
                const response = await fetch(CONFIG.API_URL + '/admin-register/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();
                if (result.success) {
                    savedEmail = email; // Save email for next step
                    emailForm.style.display = "none"; // Hide email form
                    otpSection.style.display = "block"; // Show OTP form
                } else {
                    alert("❌ " + result.message);
                }
            } catch (error) {
                alert("❌ Server Error: " + error.message);
            } finally {
                btn.innerHTML = "SEND OTP";
                btn.disabled = false;
            }
        });

        // STEP 2: Verify OTP and Reset Password API Call
        otpSection.addEventListener("submit", async function (e) {
            e.preventDefault();
            const otp = document.getElementById("otpCode").value;
            const newPassword = document.getElementById("newPassword").value;
            const btn = document.getElementById("resetBtn");

            btn.innerHTML = "Resetting...";
            btn.disabled = true;

            try {
                const response = await fetch(CONFIG.API_URL + '/admin-register/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: savedEmail, otp, newPassword })
                });

                const result = await response.json();
                if (result.success) {
                    alert("✅ " + result.message);
                    window.location.href = "admin_login_employe.html"; // Redirect to login
                } else {
                    alert("❌ " + result.message);
                }
            } catch (error) {
                alert("❌ Server Error: " + error.message);
            } finally {
                btn.innerHTML = "RESET PASSWORD";
                btn.disabled = false;
            }
        });
    });
    </script>
    <script src="config.js"></script>
</body>
</html>
