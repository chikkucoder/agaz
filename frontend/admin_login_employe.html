<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Aagaj Foundation</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-red: #ED1C24;   
            --primary-yellow: #fdd831; 
            --text-dark: #333333;
            --bg-light: #fffdf5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card Styling to match Modal look */
        .login-card {
            width: 100%;
            max-width: 450px;
            border: none;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-red), #b0151b);
            color: white;
            padding: 20px;
            border-bottom: none;
        }

        /* Custom Tabs */
        .nav-pills .nav-link {
            color: #666;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .nav-pills .nav-link.active {
            background-color: var(--primary-red);
            color: white;
            box-shadow: 0 4px 10px rgba(237, 28, 36, 0.3);
        }

        /* Form Inputs */
        .form-control:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 0 0.25rem rgba(237, 28, 36, 0.1);
        }

        .input-group-text {
            border-color: #ced4da;
            background-color: #f8f9fa;
        }

        .btn-custom {
            background-color: var(--primary-red);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #b0151b;
            color: white;
        }
        
        .btn-signup {
            background-color: var(--primary-yellow);
            color: #333;
            font-weight: bold;
        }
        .btn-signup:hover {
            background-color: #eec600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold">
                <i class="fa-solid fa-shield-halved me-2"></i> Admin Access
            </h5>
            <a href="index.html" class="text-white text-decoration-none" title="Back to Home">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>

        <div class="p-4">
            <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Log In</button>
                </li>
                <li class="nav-item" role="presentation" id="signup-nav-item">
                    <button class="nav-link fw-bold" id="pills-signup-tab" data-bs-toggle="pill" data-bs-target="#pills-signup" type="button" role="tab">Sign Up</button>
                </li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
                
                <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                                <input type="email" class="form-control" id="adminEmail" placeholder="admin@example.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" id="adminPassword" placeholder="******" required>
                            </div>
                            
                        </div>

                        <button type="submit" class="btn btn-custom w-100 py-2">LOG IN</button>

                        <div class="mt-2" style=" text-align: left; text-align: center; padding: 10px; border-radius: 5px;">
                                Forgot your password?
                                <a href="forgot_password.html" class="text-decoration-none small fw-bold" style="color: var(--primary-red);"> Click Here</a>
                            </div>
                    </form>
                </div>

                <div class="tab-pane fade" id="pills-signup" role="tabpanel">
                    <form id="adminRegisterForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                                <input type="text" id="signupName" class="form-control" placeholder="Enter Name" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                                <input type="email" id="signupEmail" class="form-control" placeholder="name@example.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Create Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" id="signupPassword" class="form-control" placeholder="******" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-signup w-100 py-2">CREATE ACCOUNT</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", async function () {
        
        // ✅ STEP 1: Check Admin Existence on Load
        try {
            const res = await fetch(CONFIG.API_URL + '/admin-register/check-admin-exists');
            const data = await res.json();

            if (data.exists) {
                // Agar Admin hai -> Signup Tab ko remove kar do
                const signupNavItem = document.getElementById('signup-nav-item');
                const signupContent = document.getElementById('pills-signup');
                
                if(signupNavItem) signupNavItem.remove();
                if(signupContent) signupContent.remove();
                
                console.log("🔒 Admin exists. Signup disabled.");
            } else {
                console.log("🔓 No Admin found. Registration open.");
            }
        } catch (error) {
            console.error("Server Check Error:", error);
        }

        const loginForm = document.getElementById("adminLoginForm");
        const registerForm = document.getElementById("adminRegisterForm");

        // ✅ ADMIN REGISTER LOGIC
        if (registerForm) {
            registerForm.addEventListener("submit", async function (e) {
                e.preventDefault();
                
                const fullName = document.getElementById("signupName").value;
                const email = document.getElementById("signupEmail").value;
                const password = document.getElementById("signupPassword").value;

                try {
                    const response = await fetch(CONFIG.API_URL + '/admin-register/register',{
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fullName, email, password })
                    });

                    const result = await response.json();
                    if (result.success) {
                        alert("✅ Admin Registered Successfully! Ab Login karein.");
                        location.reload(); // Reload hone par signup gayab ho jayega
                    } else {
                        alert("❌ " + result.message);
                    }
                } catch (error) {
                    alert("❌ Server connection error.");
                }
            });
        }

        // ✅ ADMIN LOGIN LOGIC
        if (loginForm) {
            loginForm.addEventListener("submit", async function (e) {
                e.preventDefault();
                const email = document.getElementById("adminEmail").value;
                const password = document.getElementById("adminPassword").value;

                try {
                    const response = await fetch(CONFIG.API_URL + '/admin-register/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const result = await response.json();
                    if (result.success) {
                        alert("✅ Login Successful!");
                        sessionStorage.setItem("loggedInUser", "Admin");
                        sessionStorage.setItem("loggedInRole", "Admin");
                        sessionStorage.setItem("adminEmail", result.admin.email);
                        sessionStorage.removeItem("loggedInUserEmail");
                        localStorage.setItem("authToken", result.token); 
                        window.location.href = "admin-dashboard.html"; 
                    } else {
                        alert("❌ " + result.message);
                    }
                } catch (error) {
                    alert("❌ Login Error: " + error.message);
                }
            });
        }
    });
    </script>
    <script src="config.js"></script>
</body>
</html>
