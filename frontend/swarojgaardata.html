<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarojgaar Yojana Data Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container-custom {
            max-width: 100%;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h2 {
            color: #333;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .back-dashboard-btn {
            text-decoration: none;
            background: #d32f2f;
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .back-dashboard-btn:hover {
            background: #b71c1c;
            color: #fff;
        }

        /* --- Search Bar --- */
        .search-container { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        #searchInput { width: 100%; max-width: 500px; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        #searchInput:focus { border-color: #d32f2f; }

        /* --- Table --- */
        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            min-width: 1200px;
        }

        thead { background-color: #f1f1f1; color: #333; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; vertical-align: middle; }
        th { font-weight: bold; font-size: 12px; text-transform: uppercase; }

        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #ffebee; }

        /* --- Photo & Badges --- */
        .user-photo { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; border: 1px solid #ccc; }
        .no-photo { width: 50px; height: 50px; border-radius: 5px; background-color: #ddd; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; }

        .group-badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 4px;
        }

        .payment-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-align: center; }
        .paid { background-color: #d4edda; color: #155724; }
        .pending { background-color: #fff3cd; color: #856404; }

        .info-cell small { display: block; color: #555; margin-top: 2px; font-size: 11.5px;}

        /* Pagination Style Override */
        .page-item.active .page-link { background-color: #d32f2f; border-color: #d32f2f; color: white; }
        .page-link { color: #d32f2f; }
        .btn-delete { padding: 6px 10px; font-size: 12px; font-weight: bold; width: 100%; white-space: nowrap; }

        /* --- Responsive Layout --- */
        @media (max-width: 1199px) {
            body { padding: 14px; }
            .container-custom { padding: 16px; }
            table { min-width: 980px; }
        }

        @media (max-width: 991px) {
            h2 {
                font-size: 1.25rem;
                line-height: 1.35;
            }

            .back-dashboard-btn {
                font-size: 13px;
                padding: 7px 12px;
            }

            #searchInput {
                max-width: 100%;
                font-size: 14px;
            }

            th, td {
                font-size: 12px;
                padding: 10px 8px;
            }
        }

        @media (max-width: 767px) {
            body { padding: 10px; }
            .container-custom { padding: 12px; border-radius: 10px; }

            h2 {
                font-size: 1.05rem;
                margin-bottom: 14px;
            }

            .search-container { margin-bottom: 12px; }

            .table-wrapper { overflow-x: visible; }
            table {
                min-width: 0;
                border-collapse: separate;
                border-spacing: 0 10px;
                margin-top: 4px;
            }

            thead {
                display: none;
            }

            tbody tr {
                display: block;
                background: #fff;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                padding: 6px;
            }

            tbody tr:nth-child(even),
            tbody tr:hover {
                background: #fff;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 10px;
                width: 100%;
                border-bottom: 1px dashed #e5e7eb;
                padding: 8px 6px;
                font-size: 12px;
                text-align: right;
                word-break: break-word;
            }

            td:last-child {
                border-bottom: none;
                padding-bottom: 4px;
            }

            td::before {
                content: attr(data-label);
                font-weight: 700;
                color: #374151;
                text-align: left;
                min-width: 108px;
                max-width: 45%;
            }

            .info-cell {
                text-align: right;
            }

            .info-cell small {
                font-size: 11px;
                margin-top: 3px;
            }

            .user-photo,
            .no-photo {
                width: 56px;
                height: 56px;
                margin-left: auto;
            }

            .group-badge {
                font-size: 11px;
                margin-bottom: 6px;
            }

            .payment-badge {
                margin-left: auto;
            }

            .btn-delete {
                max-width: 180px;
                margin-left: auto;
                font-size: 11px;
                padding: 8px 10px;
            }

            .pagination {
                flex-wrap: wrap;
                gap: 4px;
            }

            .page-link {
                padding: 6px 9px;
                font-size: 12px;
            }
        }

        @media (max-width: 420px) {
            h2 { font-size: 0.95rem; }

            td {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }

            td::before {
                max-width: 100%;
                min-width: 0;
            }

            .info-cell,
            .user-photo,
            .no-photo,
            .payment-badge,
            .btn-delete {
                margin-left: 0;
            }

            .btn-delete {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container-custom">
        <h2>
            <span>Mahila Swarojgaar Yojana - Admin Data</span>
            <a href="admin-dashboard.html" class="back-dashboard-btn">Back to Dashboard</a>
        </h2>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by Group, Name, Village, Mobile or Txn ID...">
        </div>

        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th width="5%">Photo</th>
                        <th width="15%">Group & Location</th> 
                        <th width="15%">Member Name</th>
                        <th width="15%">Aadhar / PAN</th>
                        <th width="10%">Mobile</th>
                        <th width="15%">Member Address</th>
                        <th width="15%">Payment & Txn Info</th>
                        <th width="10%">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" style="text-align:center; padding: 20px; font-weight:bold;">Loading Data...</td></tr>
                </tbody>
            </table>
        </div>

        <nav class="mt-3">
            <ul class="pagination justify-content-center" id="paginationControls"></ul>
        </nav>
    </div>

    <script>
        // Global Variables
        let allData = [];
        let currentFilteredData = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        // ✅ 1. Fetch Data
        async function fetchData() {
            try {
                const response = await fetch(CONFIG.API_URL + '/swarojgaar/all-groups');
                const result = await response.json();

                if (result.success) {
                    allData = flattenData(result.data);
                    currentFilteredData = allData;
                    renderTable(currentFilteredData);
                } else {
                    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">Error loading data</td></tr>`;
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">Server Connection Failed</td></tr>`;
            }
        }

        // ✅ Flatten the nested data to get ALL details
        function flattenData(groups) {
            let flatList = [];
            groups.forEach(group => {
                const groupInfo = {
                    groupId: group._id, // Required for deleting
                    groupName: group.groupName,
                    village: group.location?.village || 'N/A',
                    panchayat: group.location?.panchayat || 'N/A',
                    subDivision: group.location?.subDivision || 'N/A',
                    district: group.location?.district || 'N/A',
                    paymentStatus: group.paymentStatus || 'Pending',
                    paymentId: group.paymentId || 'N/A',
                    registrationFee: group.registrationFee || 100,
                    date: new Date(group.createdAt).toLocaleDateString('en-IN')
                };

                if(group.members && group.members.length > 0) {
                    group.members.forEach(member => {
                        flatList.push({ ...member, ...groupInfo });
                    });
                }
            });
            return flatList;
        }

        // ✅ 2. Render Data with Pagination
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;">No Records Found</td></tr>`;
                document.getElementById('paginationControls').innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(data.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = 1;
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedData = data.slice(start, end);

            paginatedData.forEach(member => {
                const tr = document.createElement('tr');

                // Photo Logic
                let photoHtml = `<div class="no-photo">N/A</div>`;
                if (member.photoUrl) {
                    const imgPath = member.photoUrl.startsWith('http') ? member.photoUrl : `${CONFIG.API_URL}${member.photoUrl}`;
                    photoHtml = `<img src="${imgPath}" class="user-photo" onerror="this.src='https://via.placeholder.com/50'">`;
                }

                // Payment Badge
                const payClass = member.paymentStatus === 'Paid' ? 'paid' : 'pending';

                tr.innerHTML = `
                    <td data-label="Photo">${photoHtml}</td>
                    <td data-label="Group & Location" class="info-cell">
                        <span class="group-badge">${member.groupName}</span>
                        <small><b>Vill:</b> ${member.village}</small>
                        <small><b>Panchayat:</b> ${member.panchayat}</small>
                        <small><b>Block:</b> ${member.subDivision}</small>
                        <small><b>Dist:</b> ${member.district}</small>
                    </td>
                    <td data-label="Member Name" style="font-weight:bold; color:#000080;">${member.fullName || '-'}</td>
                    <td data-label="Aadhar / PAN" class="info-cell">
                        <b>Aadhar:</b> ${member.aadharCard || '-'}<br>
                        <b>PAN:</b> ${member.panCard || '-'}
                    </td>
                    <td data-label="Mobile" style="font-weight:bold;">${member.mobileNumber || '-'}</td>
                    <td data-label="Member Address" style="font-size:12px;">${member.address || '-'}</td>
                    <td data-label="Payment & Txn Info" class="info-cell">
                        <span class="payment-badge ${payClass}">${member.paymentStatus}</span>
                        <small><b>Fee:</b> ₹${member.registrationFee}</small>
                        <small><b>Txn ID:</b> ${member.paymentId}</small>
                        <small><b>Date:</b> ${member.date}</small>
                    </td>
                    <td data-label="Action">
                        <button class="btn btn-danger btn-delete" onclick="deleteGroup('${member.groupId}', '${member.groupName}')">Delete Member</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            renderPagination(totalPages);
        }

        // ✅ 3. Delete Group Function
        async function deleteGroup(groupId, groupName) {
            if (!groupId) return;
            
            // Warning: Since users are saved as a Group, deleting will remove all 10 women of that group.
            const confirmDelete = confirm(`Are you sure you want to completely delete the Member "${groupName}" and all its members? This action cannot be undone.`);
            
            if (!confirmDelete) return;

            try {
                const response = await fetch(`${CONFIG.API_URL}/swarojgaar/delete/${groupId}`, { 
                    method: 'DELETE' 
                });
                
                const result = await response.json();

                if (result.success) {
                    alert("Member deleted successfully.");
                    fetchData(); // Reload table
                } else {
                    alert("Failed to delete member: " + (result.message || "Unknown error"));
                }
            } catch (error) {
                console.error("Delete Error:", error);
                alert("Server error while trying to delete the member.");
            }
        }

        // ✅ 4. Pagination Controls
        function renderPagination(totalPages) {
            const nav = document.getElementById('paginationControls');
            nav.innerHTML = '';
            if(totalPages <= 1) return;

            nav.innerHTML += `<li class="page-item ${currentPage===1?'disabled':''}"><button class="page-link" onclick="changePage(${currentPage-1})">Prev</button></li>`;
            
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if(endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for(let i=startPage; i<=endPage; i++) {
                nav.innerHTML += `<li class="page-item ${currentPage===i?'active':''}"><button class="page-link" onclick="changePage(${i})">${i}</button></li>`;
            }

            nav.innerHTML += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><button class="page-link" onclick="changePage(${currentPage+1})">Next</button></li>`;
        }

        window.changePage = function(page) { currentPage = page; renderTable(currentFilteredData); }

        // ✅ 5. Search Filter
        document.getElementById('searchInput').addEventListener('keyup', function() {
            const term = this.value.toLowerCase();
            
            currentFilteredData = allData.filter(member => {
                return (member.groupName || "").toLowerCase().includes(term) ||
                       (member.fullName || "").toLowerCase().includes(term) ||
                       (member.village || "").toLowerCase().includes(term) ||
                       (member.mobileNumber || "").toString().includes(term) ||
                       (member.aadharCard || "").includes(term) ||
                       (member.paymentId || "").toLowerCase().includes(term); // Added Txn ID search
            });

            currentPage = 1;
            renderTable(currentFilteredData);
        });

        window.onload = fetchData;
    </script>
    <script src="config.js"></script>
</body>
</html>
