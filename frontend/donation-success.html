<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Successful - Aagaj Foundation</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-red: #ED1C24; --primary-yellow: #fdd831; --text-dark: #333333; --bg-light: #fffdf5; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .success-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 5px solid #198754; text-align: center; max-width: 600px; width: 90%; }
        .success-icon { font-size: 6rem; color: #198754; margin-bottom: 20px; }
        .btn-home { background-color: var(--primary-red); color: white; font-weight: 600; padding: 12px 30px; border-radius: 50px; border: none; transition: all 0.3s; margin-top: 20px; display: inline-block; text-decoration: none; }
        .btn-home:hover { background-color: #c41219; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="success-card">
        <i class="fa-solid fa-circle-check success-icon"></i>
        <h1 class="fw-bold mb-3">Payment Successful!</h1>
        <p class="text-muted fs-5 mb-4">Thank you for your generous donation to Aagaj Foundation. Your contribution will help us make a real difference.</p>
        
        <div class="p-3 mb-4 rounded" style="background-color: #f8f9fa; border: 1px dashed #ccc;">
            <p class="mb-0 small">A confirmation email with your 80G Tax Exemption receipt will be sent to you shortly.</p>
        </div>

        <a href="index.html" class="btn-home">
            <i class="fa-solid fa-arrow-left me-2"></i> Return to Home
        </a>
    </div>

</body>
</html>
