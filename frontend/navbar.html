
<style>
    :root {
        --primary-red: #ED1C24;
        --primary-yellow: #fdd831;
        --text-dark: #333333;
        --bg-light: #fffdf5;
        --navbar-bg: #FFC0CB;
    }

    /* =========================================
       BASE NAVBAR STYLING (DESKTOP FIRST)
       ========================================= */
    
    .navbar {
        padding: 10px 0;
        transition: all 0.3s ease;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
    }
    
    .navbar-brand { 
        display: flex;
        align-items: center;
    }
    
    .navbar-brand img { 
        height: 85px; 
        width: auto; 
        transition: transform 0.3s ease;
    }
    
    .navbar-brand:hover img { 
        transform: scale(1.05);
    }
    
    /* Navigation Links */
    .nav-link { 
        font-weight: 600; 
        color: var(--text-dark); 
        padding: 10px 18px !important; 
        border-radius: 8px; 
        position: relative; 
        transition: all 0.3s ease; 
        white-space: nowrap;
    }
    
    /* Hover & Active Effects */
    .nav-link:hover { 
        color: var(--primary-red) !important; 
        background-color: rgba(253, 216, 49, 0.15); 
        transform: translateY(-2px); 
    }
    
    .nav-link.active { 
        color: var(--primary-red) !important; 
        background-color: rgba(237, 28, 36, 0.08); 
    }
    
    .nav-link::after { 
        content: ''; 
        position: absolute; 
        bottom: 5px; 
        left: 50%; 
        transform: translateX(-50%);
        width: 0%; 
        height: 3px; 
        background-color: var(--primary-yellow); 
        transition: width 0.3s ease; 
    }
    
    .nav-link:hover::after, 
    .nav-link.active::after { 
        width: 80%; 
    }

    /* Dropdown Styling */
    .dropdown-menu { 
        border-top: 3px solid var(--primary-red) !important; 
        border-radius: 0 0 12px 12px; 
        padding: 8px 0; 
        margin-top: 0; 
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .dropdown-item { 
        padding: 12px 24px; 
        font-weight: 500; 
        color: var(--text-dark); 
        transition: all 0.3s ease; 
    }
    
    .dropdown-item:hover { 
        background-color: var(--bg-light); 
        color: var(--primary-red); 
        padding-left: 30px; 
        font-weight: 600;
    }

    /* Donate Button Styling */
    .nav-item.ms-2 .nav-link {
        background-color: var(--primary-yellow); 
        color: var(--text-dark) !important; 
        padding: 10px 25px !important; 
        border-radius: 30px; 
        box-shadow: 0 4px 10px rgba(253, 216, 49, 0.4); 
        display: inline-flex; 
        align-items: center;
        justify-content: center;
        font-weight: 700;
    }
    
    .nav-item.ms-2 .nav-link:hover {
        background-color: #ffc107;
        box-shadow: 0 6px 15px rgba(253, 216, 49, 0.6);
        transform: translateY(-3px);
    }
    
    .nav-item.ms-2 .nav-link::after {
        display: none; /* Remove underline from donate button */
    }

    /* Admin Button */
    .admin-btn { 
        display: inline-flex; 
        align-items: center; 
        justify-content: center;
        text-decoration: none; 
        color: var(--text-dark); 
        font-weight: 700; 
        padding: 10px 22px; 
        border: 2px solid var(--text-dark); 
        border-radius: 30px; 
        transition: all 0.3s ease; 
        margin-left: 15px; 
        white-space: nowrap;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
    }
    
    .admin-btn:hover { 
        background-color: var(--primary-red); 
        color: white !important; 
        border-color: var(--primary-red); 
        transform: translateY(-2px);
        box-shadow: 0 5px 12px rgba(237, 28, 36, 0.3);
    }
    
    /* Navbar Toggler Button (Mobile) */
    .navbar-toggler {
        border: 2px solid var(--text-dark);
        border-radius: 8px;
        padding: 8px 12px;
        transition: all 0.3s ease;
    }
    
    .navbar-toggler:focus {
        box-shadow: 0 0 0 0.2rem rgba(237, 28, 36, 0.25);
    }
    
    .navbar-toggler:hover {
        background-color: rgba(237, 28, 36, 0.1);
    }
    
    .navbar-toggler-icon {
        width: 24px;
        height: 24px;
    }
    
    /* =========================================
       RESPONSIVE BREAKPOINTS
       ========================================= */
    
    /* Large Desktop (1200px+) - Optimal spacing */
    @media (min-width: 1200px) {
        .nav-link {
            padding: 12px 20px !important;
        }
    }
    
    /* Desktop/Laptop (992px-1199px) */
    @media (min-width: 992px) and (max-width: 1199px) {
        .navbar-brand img {
            height: 75px;
        }
        
        .nav-link {
            padding: 10px 14px !important;
            font-size: 0.95rem;
        }
        
        .admin-btn {
            padding: 8px 18px;
            font-size: 0.9rem;
        }
    }
    
    /* Tablet & Mobile (max-width: 991px) */
    @media (max-width: 991px) {
        .navbar {
            padding: 10px 0;
        }
        
        .navbar-brand img {
            height: 65px;
        }

        .navbar-toggler {
            border-width: 2px;
            padding: 10px 14px;
        }

        /* Mobile Menu Container */
        .navbar-collapse {
            background-color: #ffffff;
            padding: 25px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin-top: 15px;
            border-top: 4px solid var(--primary-red);
        }

        /* Navigation Items */
        .navbar-nav {
            width: 100%;
        }
        
        .navbar-nav .nav-item {
            margin-bottom: 8px;
            width: 100%;
        }

        /* Center alignment for mobile */
        .nav-link {
            justify-content: center;
            display: block;
            width: 100%;
            text-align: center;
            padding: 14px 20px !important;
            font-size: 1rem;
            border-radius: 10px;
        }

        .nav-link:hover {
            transform: translateY(0);
            transform: scale(1.02);
        }
        
        .nav-link::after {
            display: none; /* Remove underline on mobile */
        }

        /* Dropdown Adjustments */
        .dropdown-menu {
            border: none !important;
            background-color: #f8f9fa;
            border-radius: 10px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.08) !important;
            margin-top: 8px;
            padding: 10px;
        }
        
        .dropdown-item {
            border-radius: 8px;
            margin-bottom: 5px;
            padding: 12px 20px !important;
            text-align: center;
        }
        
        .dropdown-item:hover {
            padding-left: 20px !important;
            transform: scale(1.02);
        }

        /* Donate Button Mobile */
        .nav-item.ms-2 {
            margin-left: 0 !important;
            margin-top: 15px;
        }
        
        .nav-item.ms-2 .nav-link {
            width: 100%;
            padding: 14px 25px !important;
            font-size: 1.1rem;
        }

        /* Admin Button Mobile */
        .admin-btn { 
            margin-left: 0; 
            margin-top: 15px; 
            width: 100%;
            padding: 14px 25px;
            font-size: 1rem;
            justify-content: center;
        }
    }
    
    /* Mobile Landscape (576px-767px) */
    @media (min-width: 576px) and (max-width: 767px) {
        .navbar-brand img {
            height: 60px;
        }
        
        .navbar-collapse {
            padding: 20px 18px;
        }
    }
    
    /* Mobile Portrait (max-width: 575px) */
    @media (max-width: 575px) {
        .navbar {
            padding: 8px 0;
        }
        
        .navbar-brand img {
            height: 55px;
        }
        
        .navbar-toggler {
            padding: 8px 12px;
        }
        
        .navbar-collapse {
            padding: 20px 15px;
        }
        
        .nav-link {
            padding: 12px 15px !important;
            font-size: 0.95rem;
        }
        
        .dropdown-item {
            padding: 10px 15px !important;
            font-size: 0.9rem;
        }
        
        .nav-item.ms-2 .nav-link,
        .admin-btn {
            padding: 12px 20px !important;
            font-size: 0.95rem;
        }
    }
    
    /* Extra Small Mobile (max-width: 400px) */
    @media (max-width: 400px) {
        .navbar-brand img {
            height: 48px;
        }
        
        .navbar-collapse {
            padding: 18px 12px;
        }
        
        .nav-link {
            padding: 10px 12px !important;
            font-size: 0.9rem;
        }
        
        .nav-item.ms-2 .nav-link,
        .admin-btn {
            padding: 10px 18px !important;
            font-size: 0.9rem;
        }
        
        .admin-btn i {
            font-size: 0.85rem;
        }
    }
    
    /* Touch-friendly tap targets for mobile */
    @media (hover: none) {
        .nav-link,
        .dropdown-item,
        .admin-btn {
            min-height: 44px;
            display: flex;
            align-items: center;
        }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Identify Current Page URL
        const path = window.location.pathname;
        const page = path.split("/").pop();

        // 2. Highlight Active Menu Item based on Page Name
        if (page === "index.html" || page === "") {
            document.getElementById('nav-home').classList.add('active');
        } else if (page === "about.html") {
            document.getElementById('nav-about').classList.add('active');
        } else if (page === "gallery.html") {
            document.getElementById('nav-gallery').classList.add('active');
        } else if (page === "appointment.html") {
            document.getElementById('nav-partners').classList.add('active');
        } else if (page === "employee-login.html") {
            document.getElementById('nav-services').classList.add('active');
        } else if (page === "mahilayojan_description.html") {
            document.getElementById('nav-services').classList.add('active');
        } 
        
        // --- NEW LOGIC FOR CAREERS DROPDOWN ---
        else if (page === "NGO-jobs.html") {
            document.getElementById('nav-careers').classList.add('active'); // Parent Highlight
            const ngoLink = document.getElementById('link-ngo-jobs');
            if(ngoLink) ngoLink.classList.add('active'); // Child Highlight (optional styling)
        } else if (page === "Normal.html") {
            document.getElementById('nav-careers').classList.add('active');
            const genLink = document.getElementById('link-general-jobs');
            if(genLink) genLink.classList.add('active');
        }

        // 3. User Login Logic (Only handling Admin Button text)
        const userName = sessionStorage.getItem('loggedInUser');
        const adminBtn = document.getElementById('admin-action-btn');

        if (userName) {
            // Change Admin button to Dashboard
            if (adminBtn) {
                adminBtn.href = "admin-dashboard.html"; 
                adminBtn.innerHTML = `<i class="fa-solid fa-gauge me-2"></i> Dashboard (${userName})`;
                adminBtn.style.borderColor = 'var(--primary-red)';
                adminBtn.style.backgroundColor = 'var(--primary-red)';
                adminBtn.style.color = 'white';
            }
        }
    });
</script>
