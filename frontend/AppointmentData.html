<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Data - Aagaj Foundation</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background: #f4f6f9; padding: 20px; font-family: sans-serif; }
        
        .container-custom {
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ✅ FIXED: Scroll Issue solved here */
        .table-responsive {
            border-radius: 10px;
            overflow-x: auto; /* Horizontal scroll enable kiya */
            -webkit-overflow-scrolling: touch; /* Mobile smooth scrolling */
        }

        /* ✅ FIXED: Ensure table is wide enough to trigger scroll on mobile */
        table {
            min-width: 900px; /* Table shrink nahi hoga, scroll aayega */
        }

        /* Pagination Theme - Matching the Warning (Yellow) Icon */
        .page-item.active .page-link {
            background-color: #ffc107; /* Bootstrap Warning Color */
            border-color: #ffc107;
            color: black;
            font-weight: bold;
        }
        .page-link {
            color: #333;
            cursor: pointer;
        }

        /* Responsive Tweaks */
        @media (max-width: 768px) {
            .header-flex {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .search-container {
                width: 100%;
            }
            .btn-back {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <div class="d-flex justify-content-between align-items-center mb-4 header-flex">
            <h3 class="fw-bold m-0"><i class="fa-solid fa-calendar-check text-warning"></i> Appointment Records</h3>
            <div class="d-flex gap-2 align-items-center flex-wrap justify-content-center">
                <span class="badge bg-warning text-dark fs-6">Total: <span id="totalCount">0</span></span>
                <button class="btn btn-dark btn-sm btn-back" onclick="window.history.back()">Back to Dashboard</button>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4 ms-auto search-container">
                <input type="text" id="searchInput" class="form-control" placeholder="Search Patient, Doctor or Phone...">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Patient Name</th>
                        <th>Contact</th>
                        <th>Health ID</th>
                        <th>Doctor/Facility</th>
                        <th>Department</th>
                        <th>Problem</th>
                        <th>Health Card</th>
                    </tr>
                </thead>
                <tbody id="apptTableBody">
                    <tr><td colspan="8" class="text-center p-4">Loading Data...</td></tr>
                </tbody>
            </table>
        </div>

        <nav class="mt-4">
            <ul class="pagination justify-content-center" id="paginationControls"></ul>
        </nav>
    </div>

    <script src="config.js"></script>
    <script>
        // Global Variables
        let allData = [];
        let currentFilteredData = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        async function loadApptData() {
            try {
                const res = await fetch(CONFIG.API_URL + '/appointment/all');
                const result = await res.json();
                
                if(result.success && result.data.length > 0) {
                    allData = result.data;
                    // Optional: Sort by Date (Newest First)
                    // allData.reverse(); 

                    currentFilteredData = allData;
                    document.getElementById('totalCount').innerText = allData.length;
                    renderTable(currentFilteredData);
                } else {
                    document.getElementById('apptTableBody').innerHTML = '<tr><td colspan="8" class="text-center">No Appointments Found</td></tr>';
                    document.getElementById('totalCount').innerText = '0';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('apptTableBody').innerHTML = '<tr><td colspan="8" class="text-center text-danger">Error loading data</td></tr>';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('apptTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">No Records Found</td></tr>';
                document.getElementById('paginationControls').innerHTML = '';
                return;
            }

            // Pagination Logic
            const totalPages = Math.ceil(data.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = 1;
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedData = data.slice(start, end);

            paginatedData.forEach(appt => {
                // View Card Link Logic
                const viewCardLink = appt.healthCardData 
                    ? `<a href="${CONFIG.API_URL}/appointment/view-card/${appt._id}" target="_blank" class="btn btn-sm btn-outline-warning text-dark"><i class="fa-solid fa-eye"></i> View</a>` 
                    : '<span class="text-muted small">No File</span>';

                tbody.innerHTML += `
                    <tr>
                        <td>${appt.date || '-'}</td>
                        <td class="fw-bold">${appt.name || 'Unknown'}</td>
                        <td>
                            <div>${appt.phone || '-'}</div>
                            <small class="text-muted" style="font-size:11px;">Aadhar: ${appt.aadhar || '-'}</small>
                        </td>
                        <td><span class="badge bg-light text-dark border">${appt.healthId || 'N/A'}</span></td>
                        <td>${appt.doctor || '-'}</td>
                        <td>${appt.department || '-'}</td>
                        <td><small>${appt.message || '-'}</small></td>
                        <td>${viewCardLink}</td>
                    </tr>
                `;
            });

            renderPagination(totalPages);
        }

        // Pagination Controls
        function renderPagination(totalPages) {
            const nav = document.getElementById('paginationControls');
            nav.innerHTML = '';
            if(totalPages <= 1) return;

            // Prev Button
            nav.innerHTML += `<li class="page-item ${currentPage===1?'disabled':''}"><button class="page-link" onclick="changePage(${currentPage-1})">Prev</button></li>`;
            
            // Page Numbers
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if(endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for(let i=startPage; i<=endPage; i++) {
                nav.innerHTML += `<li class="page-item ${currentPage===i?'active':''}"><button class="page-link" onclick="changePage(${i})">${i}</button></li>`;
            }

            // Next Button
            nav.innerHTML += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><button class="page-link" onclick="changePage(${currentPage+1})">Next</button></li>`;
        }

        window.changePage = function(page) {
            currentPage = page;
            renderTable(currentFilteredData);
        }

        // Search Functionality
        document.getElementById('searchInput').addEventListener('keyup', function() {
            const term = this.value.toLowerCase();
            currentFilteredData = allData.filter(appt => {
                return (appt.name && appt.name.toLowerCase().includes(term)) ||
                       (appt.doctor && appt.doctor.toLowerCase().includes(term)) ||
                       (appt.phone && appt.phone.toString().includes(term)) ||
                       (appt.healthId && appt.healthId.toLowerCase().includes(term));
            });
            currentPage = 1;
            renderTable(currentFilteredData);
        });

        // Initialize
        loadApptData();
    </script>
</body>
</html>
